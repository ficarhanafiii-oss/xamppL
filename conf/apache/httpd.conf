ServerRoot "/opt/myxampp/apache"
Listen 80
LoadModule mpm_event_module  /usr/lib/apache2/modules/mod_mpm_event.so
LoadModule authz_core_module /usr/lib/apache2/modules/mod_authz_core.so
LoadModule dir_module        /usr/lib/apache2/modules/mod_dir.so
LoadModule mime_module       /usr/lib/apache2/modules/mod_mime.so
LoadModule log_config_module /usr/lib/apache2/modules/mod_log_config.so
LoadModule php_module        /usr/lib/apache2/modules/libphp.so
LoadModule rewrite_module    /usr/lib/apache2/modules/mod_rewrite.so
ServerAdmin webmaster@localhost
ServerName  localhost
DocumentRoot "/opt/myxampp/htdocs"
<Directory "/opt/myxampp/htdocs">
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>
DirectoryIndex index.php index.html
AddType application/x-httpd-php .php
ErrorLog  "/opt/myxampp/logs/apache_error.log"
CustomLog "/opt/myxampp/logs/apache_access.log" combined
PidFile   "/opt/myxampp/var/run/apache2.pid"
Include   "/opt/myxampp/apache/conf/extra/httpd-vhosts.conf"
