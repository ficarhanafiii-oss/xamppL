[PHP]
engine = On
short_open_tag = Off
memory_limit = 128M
max_execution_time = 30
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = On
log_errors = On
error_log = /opt/myxampp/logs/php_error.log
post_max_size = 16M
upload_max_filesize = 16M
max_file_uploads = 20
default_charset = "UTF-8"
date.timezone = Asia/Jakarta
extension_dir = /opt/myxampp/php/ext
