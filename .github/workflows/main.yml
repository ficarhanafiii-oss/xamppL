name: Build MyXAMPP ARM64

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (ARM64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build & Package inside ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/work \
            -w /work \
            ubuntu:22.04 bash -c "
              set -e
              export DEBIAN_FRONTEND=noninteractive

              echo '[1/5] Installing dependencies...'
              apt-get update -qq
              apt-get install -y \
                build-essential cmake ninja-build \
                pkg-config libssl-dev \
                libgl1-mesa-dev libgles2-mesa-dev \
                libx11-dev libx11-xcb-dev \
                libxcb1-dev libxcb-glx0-dev \
                libxcb-icccm4-dev libxcb-image0-dev \
                libxcb-keysyms1-dev libxcb-randr0-dev \
                libxcb-render-util0-dev libxcb-shape0-dev \
                libxcb-shm0-dev libxcb-sync-dev \
                libxcb-xfixes0-dev libxcb-xinerama0-dev \
                libxcb-xkb-dev libxkbcommon-dev \
                libxkbcommon-x11-dev libfontconfig1-dev \
                libfreetype6-dev libdbus-1-dev \
                qt6-base-dev qt6-base-dev-tools \
                qt6-tools-dev qt6-tools-dev-tools \
                libqt6widgets6 libqt6gui6 libqt6core6 \
                libqt6network6 libqt6dbus6 \
                qt6-wayland

              echo '[2/5] Verifying Qt6...'
              pkg-config --modversion Qt6Core || echo 'Qt6Core not found via pkg-config'
              qmake6 --version || true
              find /usr -name 'Qt6WidgetsConfig.cmake' 2>/dev/null
              find /usr -name 'libQt6Widgets*' 2>/dev/null

              echo '[3/5] Configuring CMake...'
              mkdir -p build && cd build
              cmake .. \
                -GNinja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/opt/myxampp \
                -DCMAKE_VERBOSE_MAKEFILE=ON
              cd ..

              echo '[4/5] Building...'
              cd build
              ninja -j\$(nproc)
              echo '--- Binary info ---'
              ls -lh myxampp
              file myxampp
              ldd myxampp || true
              cd ..

              echo '[5/5] Packaging...'
              mkdir -p artifact/myxampp/bin
              cp build/myxampp        artifact/myxampp/bin/
              cp myxamppctl           artifact/myxampp/bin/
              cp install.sh           artifact/myxampp/
              cp build.sh             artifact/myxampp/
              cp -r conf/             artifact/myxampp/
              cp -r scripts/          artifact/myxampp/
              cp README.md            artifact/myxampp/
              chmod +x artifact/myxampp/bin/myxampp
              chmod +x artifact/myxampp/bin/myxamppctl
              chmod +x artifact/myxampp/install.sh
              chmod +x artifact/myxampp/scripts/*.sh
              cd artifact
              tar czf myxampp-arm64.tar.gz myxampp/
              ls -lh myxampp-arm64.tar.gz
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: myxampp-arm64
          path: artifact/myxampp-arm64.tar.gz
          retention-days: 30
